<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadmap Workshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* =====================================================================
       DESIGN SYSTEM — CSS Custom Properties
       ===================================================================== */
    :root {
      /* Backgrounds */
      --bg-page:    #f8f9fb;
      --bg-card:    #ffffff;
      --bg-sidebar: #f5f0ff;

      /* Borders */
      --border:       rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.14);

      /* Text */
      --text-primary:   #111827;
      --text-secondary: #4b5563;
      --text-muted:     #9ca3af;

      /* Accent — blue */
      --accent:     #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.08);

      /* Green */
      --green:     #16a34a;
      --green-dim: rgba(22, 163, 74, 0.08);

      /* Purple */
      --purple:     #7c3aed;
      --purple-dim: rgba(124, 58, 237, 0.08);

      /* Grey action */
      --grey-action: #6b7280;

      /* Category colours */
      --cat-soft-blue:  #dbeafe;
      --cat-lavender:   #ede9fe;
      --cat-mint:       #d1fae5;
      --cat-soft-yellow:#fef9c3;
      --cat-light-grey: #f1f5f9;
      --cat-teal:       #ccfbf1;
      --cat-indigo:     #e0e7ff;
      --cat-lime:       #ecfccb;

      /* Border radius */
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Typography */
      --font:      'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

      /* Top bar */
      --topbar-height: 52px;
    }

    /* =====================================================================
       RESET & BASE
       ===================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =====================================================================
       TOP BAR
       ===================================================================== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--topbar-height);
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
    }

    .topbar__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* =====================================================================
       PHASE TABS
       ===================================================================== */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tab {
      padding: 5px 14px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
    }

    .tab:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .tab.is-active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }

    /* =====================================================================
       MAIN CONTENT AREA
       ===================================================================== */
    .main {
      min-height: calc(100vh - var(--topbar-height));
    }

    /* =====================================================================
       VIEW PANELS
       ===================================================================== */
    .view {
      display: none;
      width: 100%;
      min-height: calc(100vh - var(--topbar-height));
      padding: 32px 24px;
    }

    .view.is-active {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Placeholder content for views */
    .view__heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .view__description {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* =====================================================================
       BUTTONS
       ===================================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1.4;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: var(--bg-page);
    }

    .btn:active {
      background: var(--cat-light-grey);
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .btn-primary:active {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>

  <!-- ===================================================================
       TOP BAR
       =================================================================== -->
  <header class="topbar">
    <span class="topbar__title">Roadmap Workshop</span>
    <nav class="tabs" role="tablist" aria-label="Roadmap phases">
      <button class="tab is-active" role="tab" aria-selected="true"  data-view="0">Before</button>
      <button class="tab"           role="tab" aria-selected="false" data-view="1">Vote topics</button>
      <button class="tab"           role="tab" aria-selected="false" data-view="2">Prioritise</button>
    </nav>
  </header>

  <!-- ===================================================================
       MAIN CONTENT
       =================================================================== -->
  <main class="main">

    <!-- View 0 — Before -->
    <div class="view is-active" id="view-0" role="tabpanel">
      <h1 class="view__heading">Before</h1>
      <p class="view__description">Set up your roadmap inputs before the workshop begins.</p>
    </div>

    <!-- View 1 — Vote topics -->
    <div class="view" id="view-1" role="tabpanel">
      <h1 class="view__heading">Vote topics</h1>
      <p class="view__description">Let participants vote on the topics that matter most.</p>
    </div>

    <!-- View 2 — Prioritise -->
    <div class="view" id="view-2" role="tabpanel">
      <h1 class="view__heading">Prioritise</h1>
      <p class="view__description">Rank and prioritise features based on workshop outcomes.</p>
    </div>

  </main>

  <!-- ===================================================================
       JAVASCRIPT — Tab switching
       =================================================================== -->
  <script>
    (function () {
      const tabs  = document.querySelectorAll('.tab');
      const views = document.querySelectorAll('.view');

      function activateTab(index) {
        tabs.forEach(function (tab, i) {
          const active = i === index;
          tab.classList.toggle('is-active', active);
          tab.setAttribute('aria-selected', active ? 'true' : 'false');
        });

        views.forEach(function (view, i) {
          view.classList.toggle('is-active', i === index);
        });
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          const viewIndex = parseInt(tab.dataset.view, 10);
          activateTab(viewIndex);
        });
      });
    }());
  </script>

</body>
</html>
